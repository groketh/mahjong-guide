<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mahjong Monday — Learn American Mah Jongg</title>
<meta name="description" content="A mobile-first guide to American Mah Jongg: tiles, the Charleston, the NMJL card, and the loop of a turn.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<style>
/* ============ Mahjong Monday — Midwest kitsch-chic ============ */

:root {
  /* Palette */
  --cream:        #FBF3E2;
  --cream-deep:   #F4E9CF;
  --cream-card:   #FFFBF1;
  --ink:          #2A1F1A;
  --ink-soft:     #5B4A3F;
  --ink-mute:     #8B7868;
  --cherry:       #C8252C;
  --cherry-deep:  #9E1A22;
  --cherry-soft:  #E8B4B5;
  --olive:        #5C6B3A;
  --olive-deep:   #3F4A26;
  --butter:       #E9B949;
  --navy:         #1F3050;
  --line:         #D8C9A6;
  --line-soft:    rgba(43, 31, 26, 0.10);

  /* Tile suit colors */
  --suit-bam:     #2E6B3F;
  --suit-dot:     #2754A8;
  --suit-crak:    #1A1612;
  --suit-red:     #B41E24;

  /* Type */
  --hand:    "Caveat", "Bradley Hand", cursive;
  --display: "DM Serif Display", "Hoefler Text", Georgia, serif;
  --body:    "Newsreader", "Iowan Old Style", Georgia, serif;
  --mono:    "DM Mono", ui-monospace, "SF Mono", monospace;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--body);
  color: var(--ink);
  background: var(--cream);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ============ Gingham background pattern ============ */
.gingham {
  background-color: var(--cherry);
  background-image:
    linear-gradient(90deg, rgba(255,255,255,0.55) 50%, transparent 50%),
    linear-gradient(0deg,  rgba(255,255,255,0.55) 50%, transparent 50%);
  background-size: 16px 16px, 16px 16px;
}
.gingham-soft {
  background-color: var(--cream);
  background-image:
    linear-gradient(90deg, rgba(200,37,44,0.18) 50%, transparent 50%),
    linear-gradient(0deg,  rgba(200,37,44,0.18) 50%, transparent 50%);
  background-size: 14px 14px, 14px 14px;
}
.gingham-tiny {
  background-color: var(--cream);
  background-image:
    linear-gradient(90deg, rgba(200,37,44,0.22) 50%, transparent 50%),
    linear-gradient(0deg,  rgba(200,37,44,0.22) 50%, transparent 50%);
  background-size: 6px 6px, 6px 6px;
}
.dots {
  background-image: radial-gradient(var(--ink) 1px, transparent 1.5px);
  background-size: 14px 14px;
  background-color: var(--cream);
}

/* ============ App shell (mobile-first) ============ */
.app {
  min-height: 100vh;
  min-height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  background: var(--cream);
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 0 1px var(--line-soft);
}
@media (min-width: 720px) {
  body { background: #EFE4C9; }
  .app { box-shadow: 0 30px 80px rgba(31, 22, 18, 0.18), 0 0 0 1px var(--line); margin-top: 24px; margin-bottom: 24px; border-radius: 6px; overflow: hidden; }
}

.app-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--cream);
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.app-header .mark {
  display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
}
.app-header .mark .hand {
  font-family: var(--hand);
  font-size: 30px;
  line-height: 0.9;
  color: var(--cherry);
  transform: rotate(-3deg);
  transform-origin: left center;
}
.app-header .mark .sub {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.app-header .crest {
  width: 36px; height: 36px;
  border: 1.5px solid var(--ink);
  border-radius: 50%;
  display: grid; place-items: center;
  font-family: var(--display);
  font-style: italic;
  font-size: 18px;
  color: var(--ink);
  background: var(--cream-card);
}

.section-bar {
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--line);
  background: var(--cream);
  position: sticky;
  top: 71px;
  z-index: 9;
}
.section-bar::-webkit-scrollbar { display: none; }
.section-bar .seg {
  flex-shrink: 0;
  padding: 12px 14px 10px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-mute);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  position: relative;
  transition: color 120ms ease;
}
.section-bar .seg:first-child { padding-left: 20px; }
.section-bar .seg:last-child { padding-right: 20px; }
.section-bar .seg.active {
  color: var(--cherry);
  border-bottom-color: var(--cherry);
}
.section-bar .seg .num {
  display: block;
  font-size: 9px;
  opacity: 0.6;
  margin-bottom: 2px;
}

.main {
  flex: 1;
  padding: 24px 20px 120px;
  min-height: 0;
}

/* ============ Bottom tab nav ============ */
.tabbar {
  position: sticky;
  bottom: 0;
  background: var(--cream);
  border-top: 1px solid var(--line);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding: 8px 0 14px;
  z-index: 11;
}
.tab {
  background: none;
  border: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 0 4px;
  cursor: pointer;
  color: var(--ink-mute);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.tab.active { color: var(--cherry); }
.tab .glyph {
  width: 22px; height: 22px;
  display: grid; place-items: center;
  font-family: var(--display);
  font-style: italic;
  font-size: 18px;
}
.tab .glyph svg { width: 22px; height: 22px; }

/* ============ Typography ============ */
.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cherry);
  margin: 0 0 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: "";
  width: 24px;
  height: 1px;
  background: var(--cherry);
}
.eyebrow.no-rule::before { display: none; }

h1.title {
  font-family: var(--display);
  font-weight: 400;
  font-size: 44px;
  line-height: 1.0;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 0 0 18px;
}
h1.title .hand {
  font-family: var(--hand);
  font-weight: 700;
  color: var(--cherry);
  font-size: 56px;
  display: inline-block;
  transform: rotate(-2deg);
  margin-right: 4px;
}
h2.section-title {
  font-family: var(--display);
  font-weight: 400;
  font-size: 28px;
  line-height: 1.1;
  margin: 0 0 14px;
  color: var(--ink);
}
h3.sub-title {
  font-family: var(--display);
  font-weight: 400;
  font-size: 20px;
  margin: 24px 0 10px;
  color: var(--ink);
}
p { margin: 0 0 14px; color: var(--ink-soft); }
p strong { color: var(--ink); font-weight: 600; }
.lede { font-size: 17px; line-height: 1.5; color: var(--ink); }
.kicker {
  font-family: var(--hand);
  color: var(--cherry);
  font-size: 28px;
  line-height: 1;
  transform: rotate(-2deg);
  display: inline-block;
}

a, .link { color: var(--cherry); text-decoration: underline; text-underline-offset: 3px; }

/* ============ Cards & callouts ============ */
.card {
  background: var(--cream-card);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 18px 18px;
  margin: 0 0 16px;
}
.card.tight { padding: 14px 16px; }
.card .card-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin: 0 0 6px;
}
.card h4 {
  font-family: var(--display);
  font-size: 20px;
  font-weight: 400;
  margin: 0 0 8px;
  color: var(--ink);
}
.callout {
  border: 1px solid var(--cherry);
  background: #FCEDED;
  border-radius: 4px;
  padding: 14px 16px;
  margin: 0 0 16px;
  position: relative;
}
.callout .tag {
  font-family: var(--hand);
  color: var(--cherry);
  font-size: 24px;
  line-height: 1;
  margin-bottom: 4px;
  display: block;
  transform: rotate(-2deg);
}
.callout p { color: var(--ink); margin: 0; }

.divider {
  height: 1px;
  background: var(--line);
  margin: 24px 0;
  border: 0;
}
.divider.deco {
  height: 14px;
  background: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: var(--cherry);
  font-family: var(--display);
  font-style: italic;
}
.divider.deco::before, .divider.deco::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--line);
}

/* ============ Buttons & chips ============ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 18px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  background: var(--ink);
  color: var(--cream);
  border: 1px solid var(--ink);
  border-radius: 2px;
  cursor: pointer;
  transition: transform 80ms ease, background 120ms ease;
  text-decoration: none;
}
.btn:active { transform: translateY(1px); }
.btn.primary { background: var(--cherry); border-color: var(--cherry); }
.btn.ghost { background: transparent; color: var(--ink); }
.btn.small { padding: 8px 12px; font-size: 10px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border: 1px solid var(--line);
  background: var(--cream-card);
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  cursor: pointer;
}
.chip.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

/* ============ Tiles ============ */
.tile {
  --tile-w: 52px;
  --tile-h: 70px;
  width: var(--tile-w);
  height: var(--tile-h);
  background: #FFFBEF;
  border: 1px solid #C9B98A;
  border-bottom: 3px solid #9C8A5A;
  border-right: 2px solid #B5A271;
  border-radius: 8px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: var(--display);
  flex-shrink: 0;
  box-shadow: 0 1px 0 rgba(0,0,0,0.04);
  user-select: none;
}
.tile.sm  { --tile-w: 40px; --tile-h: 54px; border-radius: 6px; }
.tile.xs  { --tile-w: 30px; --tile-h: 40px; border-radius: 5px; }
.tile.lg  { --tile-w: 72px; --tile-h: 96px; border-radius: 10px; }
.tile.xl  { --tile-w: 96px; --tile-h: 128px; border-radius: 12px; }

.tile .num {
  font-size: 26px;
  line-height: 1;
  font-weight: 400;
  color: var(--ink);
}
.tile .label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 4px;
  color: var(--ink-mute);
}
.tile.sm .num { font-size: 20px; }
.tile.sm .label { font-size: 7px; }
.tile.xs .num { font-size: 14px; }
.tile.xs .label { font-size: 6px; margin-top: 2px; letter-spacing: 0.08em; }
.tile.lg .num { font-size: 36px; }
.tile.lg .label { font-size: 10px; margin-top: 6px; }
.tile.xl .num { font-size: 52px; }
.tile.xl .label { font-size: 12px; margin-top: 8px; }

.tile[data-suit="bam"] .num   { color: var(--suit-bam); }
.tile[data-suit="dot"] .num   { color: var(--suit-dot); }
.tile[data-suit="crak"] .num  { color: var(--suit-crak); }
.tile[data-suit="wind"] .num  { color: var(--suit-crak); }
.tile[data-suit="dragR"] .num { color: var(--suit-red); }
.tile[data-suit="dragG"] .num { color: var(--suit-bam); }
.tile[data-suit="dragW"] .num { color: var(--suit-dot); font-family: var(--mono); font-size: 18px; letter-spacing: 0.05em; }
.tile[data-suit="flower"] .num { color: var(--cherry); font-family: var(--hand); font-weight: 700; }
.tile[data-suit="joker"] { background: linear-gradient(135deg, #FFFBEF 50%, #FFEAB5 50%); }
.tile[data-suit="joker"] .num { color: var(--cherry); font-size: 22px; }

.tile.face-down {
  background: var(--olive);
  border-color: var(--olive-deep);
  border-bottom-color: #1F2A14;
  border-right-color: #2E3919;
}
.tile.face-down::before {
  content: "";
  position: absolute;
  inset: 6px;
  border: 1px solid rgba(251, 243, 226, 0.25);
  border-radius: 4px;
}
.tile.face-down::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 50%, rgba(251, 243, 226, 0.18) 0, rgba(251, 243, 226, 0.18) 2px, transparent 2.5px),
    radial-gradient(circle at 25% 25%, rgba(251, 243, 226, 0.10) 0, rgba(251, 243, 226, 0.10) 1.5px, transparent 2px),
    radial-gradient(circle at 75% 75%, rgba(251, 243, 226, 0.10) 0, rgba(251, 243, 226, 0.10) 1.5px, transparent 2px);
  background-size: 16px 16px;
}

.tile.selected {
  outline: 2px solid var(--cherry);
  outline-offset: 2px;
  transform: translateY(-4px);
}
.tile.dim { opacity: 0.32; }
.tile.lift { transform: translateY(-6px); transition: transform 200ms; }

.tile-rack {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

/* ============ Charleston board ============ */
.cville {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  background: var(--cream-card);
  border: 1px solid var(--line);
  border-radius: 6px;
  overflow: hidden;
}
.cville .felt {
  position: absolute;
  inset: 14%;
  background: var(--olive);
  border-radius: 4px;
  box-shadow: inset 0 0 0 1px var(--olive-deep), inset 0 0 30px rgba(0,0,0,0.25);
}
.cville .seat {
  position: absolute;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink);
  background: var(--cream);
  border: 1px solid var(--line);
  padding: 5px 9px;
  border-radius: 2px;
  white-space: nowrap;
}
.cville .seat .you {
  display: block;
  font-family: var(--hand);
  color: var(--cherry);
  text-transform: none;
  letter-spacing: 0;
  font-size: 18px;
  line-height: 1;
  margin-top: 2px;
}
.cville .seat.n { top: 4px; left: 50%; transform: translateX(-50%); }
.cville .seat.e { right: 8px; top: 50%; transform: translateY(-50%); text-align: right; }
.cville .seat.s { bottom: 4px; left: 50%; transform: translateX(-50%); }
.cville .seat.w { left: 8px; top: 50%; transform: translateY(-50%); }

.cville .arrow {
  position: absolute;
  stroke: var(--cherry);
  stroke-width: 2.5;
  fill: none;
  filter: drop-shadow(0 1px 0 rgba(255,255,255,0.5));
}

.cville .step-label {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: var(--cream);
  font-family: var(--hand);
  font-size: 36px;
  line-height: 1;
  pointer-events: none;
}
.cville .step-label .meta {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cream-deep);
  display: block;
  margin-top: 4px;
}

/* ============ Card line viewer ============ */
.cardline {
  background: var(--cream-card);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 18px 14px;
  margin: 0 0 16px;
  position: relative;
}
.cardline .head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 12px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.cardline .hand-line {
  display: flex;
  gap: 6px;
  align-items: center;
  font-family: var(--display);
  font-size: 22px;
  color: var(--ink);
  flex-wrap: wrap;
  letter-spacing: 0.04em;
}
.cardline .group {
  display: inline-flex;
  align-items: center;
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 120ms ease, transform 80ms;
  letter-spacing: 0.04em;
}
.cardline .group:hover { background: var(--cream-deep); }
.cardline .group.active { background: var(--cherry); color: var(--cream); }
.cardline .group.active .glyph { color: var(--cream); }
.cardline .glyph {
  font-family: var(--display);
}
.cardline .glyph[data-color="bam"]  { color: var(--suit-bam); }
.cardline .glyph[data-color="dot"]  { color: var(--suit-dot); }
.cardline .glyph[data-color="crak"] { color: var(--suit-crak); }
.cardline .glyph[data-color="red"]  { color: var(--suit-red); }

.cardline .footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px dashed var(--line);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.cardline .footer .pay {
  color: var(--cherry);
  font-family: var(--display);
  font-size: 16px;
  letter-spacing: 0;
  text-transform: none;
  font-style: italic;
}

.cardline-help {
  background: var(--cream-deep);
  border: 1px dashed var(--cherry);
  border-radius: 4px;
  padding: 12px 14px;
  margin-top: 8px;
  font-size: 14px;
  color: var(--ink);
  min-height: 60px;
}
.cardline-help .h {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--cherry);
  margin-bottom: 4px;
}

/* ============ Turn simulator ============ */
.sim-table {
  background: var(--olive);
  border-radius: 6px;
  padding: 18px 12px;
  color: var(--cream);
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.sim-table::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.06), transparent 65%);
  pointer-events: none;
}
.sim-rack-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--cream-deep);
  margin-bottom: 6px;
}
.sim-rack { display: flex; gap: 3px; flex-wrap: wrap; }
.sim-center {
  margin: 14px 0;
  background: rgba(0,0,0,0.18);
  border: 1px dashed rgba(251, 243, 226, 0.25);
  border-radius: 4px;
  padding: 12px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}
.sim-center .discard-pile { display: flex; gap: 3px; }
.sim-center .label {
  font-family: var(--hand);
  font-size: 18px;
  color: var(--cream);
  transform: rotate(-2deg);
  line-height: 1;
}

.sim-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.sim-actions .btn { flex: 1; min-width: 100px; }

.sim-step {
  background: var(--cream-card);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 14px 14px;
  margin-bottom: 12px;
}
.sim-step .num {
  font-family: var(--hand);
  color: var(--cherry);
  font-size: 32px;
  line-height: 1;
  transform: rotate(-3deg);
  display: inline-block;
}
.sim-step h5 {

  font-size: 18px;
  font-weight: 400;
  margin: 6px 0 8px;
}
.sim-step p { margin: 0; font-size: 14px; }

/* ============ Hand builder ============ */
.builder-tray {
  background: var(--cream-card);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 12px;
  margin-bottom: 12px;
  min-height: 80px;
}
.builder-tray .empty {
  font-family: var(--hand);
  color: var(--ink-mute);
  font-size: 22px;
  text-align: center;
  padding: 12px 0;
  transform: rotate(-1deg);
}
.builder-palette {
  background: var(--cream-deep);
  border-radius: 4px;
  padding: 10px;
  margin-bottom: 12px;
}
.builder-palette .pal-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 8px;
}
.builder-palette .scroll {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: thin;
  padding-bottom: 4px;
}
.builder-palette .scroll::-webkit-scrollbar { height: 4px; }
.builder-palette .scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

.builder-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 6px;
}
.builder-meta .count {
  font-family: var(--display);
  font-size: 18px;
  color: var(--ink);
  letter-spacing: 0;
}
.builder-meta .count strong { color: var(--cherry); }

/* ============ Flashcard ============ */
.flash-wrap { margin-bottom: 16px; }
.flashcard {
  position: relative;
  width: 100%;
  min-height: 240px;
  cursor: pointer;
}
.flash-face {
  position: relative;
  width: 100%;
  min-height: 240px;
  background: var(--cream-card);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 28px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  animation: cardIn 280ms cubic-bezier(0.2, 0.8, 0.2, 1);
}
.flash-face.back { background: var(--cream-deep); border-color: var(--cherry); }
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.flash-face .q-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cherry);
  margin-bottom: 14px;
}
.flash-face .q-prompt {
  font-family: var(--display);
  font-size: 22px;
  line-height: 1.2;
  color: var(--ink);
  margin: 0;
}
.flash-face .q-answer {
  font-family: var(--display);
  font-size: 24px;
  line-height: 1.2;
  color: var(--ink);
  margin: 0 0 10px;
}
.flash-face .q-detail { font-size: 14px; color: var(--ink-soft); margin: 0; }
.flash-face .flip-hint {
  position: absolute; bottom: 12px;
  font-family: var(--hand); color: var(--cherry);
  font-size: 18px; transform: rotate(-2deg);
}
.flash-controls {
  display: flex;
  gap: 8px;
}
.flash-controls .btn { flex: 1; }

/* ============ Lists & misc ============ */
ul.clean { list-style: none; padding: 0; margin: 0 0 14px; }
ul.clean li {
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
ul.clean li:last-child { border-bottom: 0; }
ul.clean li .num {
  font-family: var(--display);
  font-style: italic;
  color: var(--cherry);
  font-size: 22px;
  line-height: 1;
  min-width: 28px;
}
ul.clean li .body { flex: 1; }
ul.clean li .body strong {
  font-family: var(--display);
  font-weight: 400;
  font-size: 17px;
  display: block;
  margin-bottom: 2px;
  color: var(--ink);
}
ul.clean li .body p { font-size: 14px; margin: 0; }

.do-dont {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.do-dont .col {
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 14px 14px;
  background: var(--cream-card);
}
.do-dont .col.do { border-color: var(--olive); }
.do-dont .col.dont { border-color: var(--cherry); }
.do-dont .col h5 {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin: 0 0 10px;
}
.do-dont .col.do h5 { color: var(--olive); }
.do-dont .col.dont h5 { color: var(--cherry); }
.do-dont ul { padding-left: 0; list-style: none; margin: 0; }
.do-dont li { font-size: 14px; padding: 6px 0; border-bottom: 1px dashed var(--line); color: var(--ink-soft); }
.do-dont li:last-child { border-bottom: 0; }
.do-dont li::before {
  display: inline-block;
  margin-right: 8px;
  font-family: var(--mono);
  font-weight: 700;
  width: 10px;
}
.do-dont .do li::before { content: "✓"; color: var(--olive); }
.do-dont .dont li::before { content: "×"; color: var(--cherry); }

/* ============ Sheet (modal-like) for tile identifier ============ */
.sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(31, 22, 18, 0.45);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 50;
  animation: fade 180ms ease;
}
.sheet {
  background: var(--cream-card);
  width: 100%;
  max-width: 480px;
  border-radius: 12px 12px 0 0;
  padding: 22px 22px 30px;
  border-top: 4px solid var(--cherry);
  animation: slideUp 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
}
.sheet .grip { width: 36px; height: 4px; background: var(--line); border-radius: 999px; margin: -10px auto 14px; }
.sheet .sheet-tile-row { display: flex; gap: 16px; align-items: flex-start; }
.sheet .sheet-tile-row .meta { flex: 1; }
.sheet .sheet-tile-row .meta .name {
  font-family: var(--display);
  font-size: 24px;
  margin: 0 0 4px;
}
.sheet .sheet-tile-row .meta .called {
  font-family: var(--hand);
  color: var(--cherry);
  font-size: 22px;
  transform: rotate(-2deg);
  display: inline-block;
  margin-bottom: 8px;
}
.sheet .sheet-tile-row .meta p { font-size: 14px; margin: 0 0 6px; }
.sheet .sheet-meta-row {
  display: flex;
  gap: 14px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--line);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.sheet .sheet-meta-row .v {
  font-family: var(--display);
  letter-spacing: 0;
  font-size: 14px;
  text-transform: none;
  color: var(--ink);
  display: block;
}

@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

/* ============ Tiles grid (for ID screen) ============ */
.tiles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
  gap: 8px;
  margin-bottom: 16px;
}
.tiles-grid .tile { width: 100%; --tile-w: auto; }

.suit-block { margin-bottom: 20px; }
.suit-block .suit-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}
.suit-block .suit-head h3 {
  font-family: var(--display);
  font-size: 18px;
  margin: 0;
  font-weight: 400;
}
.suit-block .suit-head .meta {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-mute);
}

/* ============ Cheat sheet ============ */
.cheat-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
.cheat-card {
  background: var(--cream-card);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 14px 14px;
}

  font-family: var(--hand);
  color: var(--cherry);
  font-size: 32px;
  line-height: 0.9;
  transform: rotate(-2deg);
  display: inline-block;
  margin-bottom: 4px;
}
.cheat-card h5 {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 400;
  margin: 0 0 4px;
}
.cheat-card p { font-size: 14px; margin: 0; }

.hero {
  position: relative;
  padding: 22px 0 8px;
}
.hero .stamp {
  position: absolute;
  top: 0;
  right: 0;

  color: var(--cherry);
  font-size: 22px;
  transform: rotate(8deg);
  border: 2px solid var(--cherry);
  padding: 4px 10px;
  border-radius: 4px;
  line-height: 1;
}
.hero .hero-tiles {
  display: flex;
  gap: 4px;
  margin: 18px 0 10px;
  justify-content: center;
}
.hero .hero-tiles .tile { transform: rotate(var(--r, 0deg)); }
.hero .hero-tiles .tile:nth-child(1) { --r: -4deg; }
.hero .hero-tiles .tile:nth-child(2) { --r: 2deg; }

  border-block: 1px solid var(--line);

  display: flex;
  gap: 6px;
  justify-content: center;

}
